version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: invest_research
      POSTGRES_USER: invest
      POSTGRES_PASSWORD: invest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invest -d invest_research"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6333/"]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:latest
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://invest:invest@postgres:5432/langfuse
      NEXTAUTH_SECRET: changeme-in-production
      NEXTAUTH_URL: http://localhost:3000
      SALT: changeme-salt-in-production
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - optional

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://invest:invest@postgres:5432/invest_research
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      LLM_MODEL: gemma4:12b
      EMBEDDING_MODEL: nomic-embed-text
      LLM_TIMEOUT: "3600"
      MCP_ENABLED: "True"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
  qdrant_data:

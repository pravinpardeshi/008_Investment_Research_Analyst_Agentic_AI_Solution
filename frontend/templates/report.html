<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Report — Investment Research Analyst</title>
    <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="navbar-brand">
                <img src="/static/images/favicon.ico" alt="">
                <span>InvestResearch</span>
            </a>
            <a href="/" class="btn btn-secondary btn-sm">&larr; Home</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Research Report</h1>
        </div>

        <section class="card">
            <div class="card-header">
                <h2><span class="icon">&#128204;</span> Research Question</h2>
                <span class="badge">Run #{{ run_id }}</span>
            </div>
            <p class="question">{{ question }}</p>
        </section>

        <section class="card report-content">
            {{ report|safe }}
        </section>
    </div>

    <footer>
        <p>Investment Research Analyst &mdash; Generated by AI agents</p>
    </footer>
</body>
</html>
